name: CI

on:
  workflow_call:
    inputs:
      test-paths:
        type: string
        default: ./...
        required: false

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          args: --verbose

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [ lint ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests with coverage
        run: |
          go test -v -race -coverprofile=coverage.out -covermode=atomic \
            $(go list ${{ inputs.test-paths }} | grep -v -E '/(vendor|cmd|testdata|mocks)/')

      - name: Strip generated files from coverage
        run: sed -i -E '/[_.]mock\.go:|\.pb\.go:|\.gen\.go:/d' coverage.out || true

      - name: Generate human-readable coverage report
        run: go tool cover -func=coverage.out | tee coverage.humanize | tail -1

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unittests
          files: coverage.out
          fail_ci_if_error: true

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v6
        with:
          name: coverage
          retention-days: 7
          path: |
            coverage.out
            coverage.humanize